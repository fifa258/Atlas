<!doctype html>
<html lang="cs">
<head>
    <title>Atlas států</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        .flag-img {
            height: 140px;
            width: 100%;
            object-fit: contain;
            background-color: #f8f9fa;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header class="bg-info text-center p-4 shadow-sm">
        <h1 class="fw-bold mb-3 text-dark">Atlas států</h1>
        <div class="row justify-content-center">
            <div class="col-md-3 col-sm-6">
                <div class="shadow-sm p-1 bg-white" style="border-radius: 10px;">
                    <select id="continent" class="form-select border-0 shadow-none">
                        <option value="Europe" selected>Evropa</option>
                        <option value="Asia">Asie</option>
                        <option value="Africa">Afrika</option>
                        <option value="Americas">Amerika</option>
                        <option value="Oceania">Oceánie</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid my-4">
        <div class="row px-2" id="countries-list"></div>
    </main>

    <footer class="bg-dark p-5 text-light text-center">
        &copy; IT2 - Filip Sochor 2026
    </footer>

    <div class="modal fade" id="one-country" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body" id="modal-body-content">
                    Načítám detaily...
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Zavřít</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="atlas.js"></script>
</body>
</html>
