<!doctype html>
<html lang="cs">
    <head>
        <title>Atlas států</title>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <header class="bg-info text-center p-4 shadow-sm">
            <h1 class="fw-bold mb-3 text-dark">Atlas států</h1>
            <div class="row justify-content-center">
                <div class="col-md-3 col-sm-6">
                    <div class="shadow-sm p-1 bg-white" style="border-radius: 10px;">
                        <select id="continent" class="form-select border-0 fw-medium shadow-none" style="border-radius: 8px; cursor: pointer; color: #1e3a8a;">
                            <option value="Europe" selected>Evropa</option>
                            <option value="Asia">Asie</option>
                            <option value="Africa">Afrika</option>
                            <option value="Americas">Amerika</option>
                            <option value="Oceania">Oceánie</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main class="container-fluid my-4">
            <div class="row px-2" id="countries-list">
            </div>
        </main>

        <footer class="bg-dark p-5 text-light text-center">
             &copy; IT2 - Filip Sochor 2026
        </footer>

        <div class="modal fade" id="one-country" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow" style="border-radius: 16px; overflow: hidden;">
                    <div class="modal-header border-0 pb-0 justify-content-end">
                        <button type="button" class="btn-close m-2 shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body pt-0" id="modal-body-content">
                        Načítám detaily...
                    </div>
                    <div class="modal-footer border-0 pt-0 justify-content-center pb-4">
                        <button type="button" class="btn btn-secondary px-4 shadow-none btn-sm" data-bs-dismiss="modal" style="border-radius: 8px;">Zavřít</button>
                    </div>
                </div>
            </div>
        </div>
        
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
        <script src="atlas.js"></script>
    </body>
</html>
